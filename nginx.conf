server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    # Serve media files with proper MIME types
    location ~* \.(jpg|jpeg|mov)$ {
        add_header Cache-Control "public, max-age=86400";
    }
}
